# ─── ITEMS ───────────────────────────────────────────────────────────────────
# Named collectables, equipment, consumables, crafting materials, currency.
# Register an item when its name or value appears in more than one GDD.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: value_gold, weight, stackable, category, and any stat
#   modifiers that another system (e.g., economy, crafting) might reference.

items: []

# Example:
#
# items:
#   - name: goblin_arm
#     status: active
#     source: design/gdd/combat.md   # drop defined in combat GDD
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md    # inventory GDD lists its weight/stack rules
#       - design/gdd/economy.md      # economy GDD references its sell price
#     value_gold: 5
#     weight: 1
#     stackable: true
#     category: crafting_material
#     added: 2026-03-26
#     revised: ""


# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: corruption_passive_tick
    status: active
    source: design/gdd/corruption-meter.md
    referenced_by:
      - design/gdd/corruption-meter.md
    variables:
      - PASSIVE_RATE
      - STATE_MULTIPLIER
      - TICK_RATE
    output_range: [0.0, 100.0]
    expression: "clamp(C_prev + (PASSIVE_RATE * STATE_MULTIPLIER / TICK_RATE), 0.0, 100.0)"
    notes: "Applied each server tick. PASSIVE_RATE default 1.0%/min. STATE_MULTIPLIER is 1.0/1.25/1.5/1.75 for CALM/ALERT/HOSTILE/CRITICAL. TICK_RATE default 60 (ticks/min)."
    added: 2026-05-15
    revised: ""

  - name: corruption_event_application
    status: active
    source: design/gdd/corruption-meter.md
    referenced_by:
      - design/gdd/corruption-meter.md
    variables:
      - C_prev
      - EVENT_WEIGHT
    output_range: [0.0, 100.0]
    expression: "clamp(C_prev + EVENT_WEIGHT, 0.0, 100.0)"
    notes: "Applied immediately on the server when a CorruptionInputEvent fires. EVENT_WEIGHT is positive (increase) or negative (decrease). See Input Event Table in GDD for all weights."
    added: 2026-05-15
    revised: ""

  - name: corruption_sector_carry
    status: active
    source: design/gdd/corruption-meter.md
    referenced_by:
      - design/gdd/corruption-meter.md
    variables:
      - C_sector_end
      - SECTOR_CARRY_FACTOR
    output_range: [0.0, 50.0]
    expression: "C_sector_end * SECTOR_CARRY_FACTOR"
    notes: "Applied on sector transition. SECTOR_CARRY_FACTOR default 0.5. Output is the starting corruption value for the next sector. Threshold flags reset after carry is applied."
    added: 2026-05-15
    revised: ""

  - name: movement_effective_speed
    status: active
    source: design/gdd/reclaimer-movement.md
    referenced_by:
      - design/gdd/reclaimer-movement.md
      - design/gdd/reclaimer-combat.md    # Combat reads V_effective for accuracy modifiers
      - design/gdd/reclaimer-class-abilities.md  # Class Abilities modifies MOVE_SPEED_MULT
    variables:
      - BASE_SPEED
      - MOVE_SPEED_MULT
    output_range: [0.0, 6.6]
    expression: "V_effective = BASE_SPEED[stance] * MOVE_SPEED_MULT[class]"
    notes: "Applied each frame via CharacterController.Move(). BASE_SPEED per stance: IDLE 0.0, WALK 3.5, SPRINT 6.0, SPRINT_EXHAUSTED 4.5, CROUCH 2.0 m/s. MOVE_SPEED_MULT per class: Breacher 0.90, Medic 1.00, Ghost 1.10, Engineer 0.95. Max output is Ghost SPRINT (6.6 m/s)."
    added: 2026-05-15
    revised: ""

  - name: movement_noise_output
    status: active
    source: design/gdd/reclaimer-movement.md
    referenced_by:
      - design/gdd/reclaimer-movement.md
      - design/gdd/reclaimer-class-abilities.md  # Class Abilities modifies NOISE_MULT at runtime
    variables:
      - BASE_NOISE
      - NOISE_MULT
    output_range: [0.0, 1.0]
    expression: "NOISE_OUT = clamp(BASE_NOISE[stance] * NOISE_MULT[class], 0.0, 1.0)"
    notes: "Emitted as FootstepEvent(noiseLevel, position) every FOOTSTEP_INTERVAL meters. Sensor Grid GDD (#7) defines zone acoustic thresholds that compare against NOISE_OUT to determine corruption input. BASE_NOISE per stance: IDLE 0.05, WALK 0.40, SPRINT/SPRINT_EXHAUSTED 0.90, CROUCH 0.15, MANTLE 0.40. NOISE_MULT per class: Ghost 0.70, Medic 1.00, Breacher 1.20, Engineer 0.95."
    added: 2026-05-15
    revised: ""

  - name: reclaimer_damage_application
    status: active
    source: design/gdd/health-damage.md
    referenced_by:
      - design/gdd/health-damage.md
      - design/gdd/reclaimer-combat.md     # Combat supplies BASE_DAMAGE for Ballistic hits
      - design/gdd/environmental-controls.md  # Environmental Controls supplies BASE_DAMAGE for hazard ticks
      - design/gdd/synth-unit-roster.md    # Synth units supply BASE_DAMAGE for Synth hits
    variables:
      - HP_prev
      - HP_MAX
      - BASE_DAMAGE
      - ARMOR_MULT
    output_range: [0.0, 100.0]
    expression: "HP_new = clamp(HP_prev - (BASE_DAMAGE * ARMOR_MULT[damageType][armorState]), 0.0, HP_MAX)"
    notes: "ARMOR_MULT lookup: Ballistic[Operational]=0.80, Ballistic[Compromised]=1.00, Ballistic[Critical]=1.10. Environmental and Synth always 1.00 regardless of ArmorState. Applied server-side via IDamageable.TakeDamage()."
    added: 2026-05-15
    revised: ""

  - name: fall_damage
    status: active
    source: design/gdd/health-damage.md
    referenced_by:
      - design/gdd/health-damage.md
      - design/gdd/level-sector-system.md  # Level design must know safe fall distances for vertical level design
    variables:
      - fall_distance
      - FALL_SAFE_DISTANCE
      - FALL_DAMAGE_RATE
      - FALL_DAMAGE_CAP
    output_range: [0.0, 100.0]
    expression: "FALL_DAMAGE = clamp(max(0, fall_distance - FALL_SAFE_DISTANCE) * FALL_DAMAGE_RATE, 0, FALL_DAMAGE_CAP)"
    notes: "Applied as TakeDamage(FALL_DAMAGE, Environmental) on landing. FALL_SAFE_DISTANCE default 3.0m, FALL_DAMAGE_RATE default 10 HP/m, FALL_DAMAGE_CAP default 100 HP (= HP_MAX, instant Downed)."
    added: 2026-05-15
    revised: ""

