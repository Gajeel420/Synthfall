# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: PASSIVE_RATE
    status: active
    source: design/gdd/corruption-meter.md
    referenced_by:
      - design/gdd/corruption-meter.md
    value: 1.0
    unit: "%/min"
    notes: "Baseline corruption rise rate per minute. Safe range 0.5–2.0. Used in corruption_passive_tick formula."
    added: 2026-05-15
    revised: ""

  - name: SECTOR_CARRY_FACTOR
    status: active
    source: design/gdd/corruption-meter.md
    referenced_by:
      - design/gdd/corruption-meter.md
    value: 0.5
    unit: fraction
    notes: "Fraction of end-of-sector corruption carried into the next sector. Safe range 0.0–0.8. 0.0 = full reset, 1.0 = full carry."
    added: 2026-05-15
    revised: ""

  - name: OBJECTIVE_REDUCTION
    status: active
    source: design/gdd/corruption-meter.md
    referenced_by:
      - design/gdd/corruption-meter.md
    value: 5.0
    unit: "%"
    notes: "Corruption reduction applied on objective completion. Safe range 3.0–10.0. Negative EVENT_WEIGHT in corruption_event_application."
    added: 2026-05-15
    revised: ""

  - name: GUNFIRE_WEIGHT
    status: active
    source: design/gdd/corruption-meter.md
    referenced_by:
      - design/gdd/corruption-meter.md
    value: 0.15
    unit: "%"
    notes: "Corruption added per single Reclaimer shot. Safe range 0.05–0.5. Auto burst uses this weight per 3-shot tick."
    added: 2026-05-15
    revised: ""

  - name: TEAMMATE_DOWNED_WEIGHT
    status: active
    source: design/gdd/corruption-meter.md
    referenced_by:
      - design/gdd/corruption-meter.md
      - design/gdd/health-damage.md       # H&D fires CorruptionInputEvent(+5.0%) on Downed transition
    value: 5.0
    unit: "%"
    notes: "Corruption added when any Reclaimer enters downed state. Safe range 2.0–10.0. Highest single-event weight in the system."
    added: 2026-05-15
    revised: ""

  - name: FOOTSTEP_INTERVAL_WALK
    status: active
    source: design/gdd/reclaimer-movement.md
    referenced_by:
      - design/gdd/reclaimer-movement.md
    value: 0.8
    unit: m
    notes: "Distance traveled between FootstepEvent firings while walking. Safe range 0.4–1.5 m. Sensor Grid GDD must know this to size acoustic zone coverage correctly."
    added: 2026-05-15
    revised: ""

  - name: FOOTSTEP_INTERVAL_SPRINT
    status: active
    source: design/gdd/reclaimer-movement.md
    referenced_by:
      - design/gdd/reclaimer-movement.md
    value: 0.6
    unit: m
    notes: "Distance traveled between FootstepEvent firings while sprinting. Safe range 0.3–1.0 m. Higher event frequency than walk — more corruption exposure per meter."
    added: 2026-05-15
    revised: ""

  - name: FOOTSTEP_INTERVAL_CROUCH
    status: active
    source: design/gdd/reclaimer-movement.md
    referenced_by:
      - design/gdd/reclaimer-movement.md
    value: 1.2
    unit: m
    notes: "Distance traveled between FootstepEvent firings while crouched. Safe range 0.6–2.0 m. Lower event frequency rewards stealth posture."
    added: 2026-05-15
    revised: ""

  - name: SPRINT_DRAIN_RATE
    status: active
    source: design/gdd/reclaimer-movement.md
    referenced_by:
      - design/gdd/reclaimer-movement.md
    value: 20.0
    unit: stamina/sec
    notes: "Stamina drained per second while sprinting. Safe range 10–40. Produces 5-second sprint window at default. Class Abilities GDD may reference if any ability modifies drain rate."
    added: 2026-05-15
    revised: ""

  - name: SPRINT_RECOVERY_THRESHOLD
    status: active
    source: design/gdd/reclaimer-movement.md
    referenced_by:
      - design/gdd/reclaimer-movement.md
    value: 30.0
    unit: stamina
    notes: "Minimum stamina required to re-enter SPRINT from SPRINT_EXHAUSTED. Safe range 10–50. Prevents sprint micro-recovery gaming. Class Abilities GDD may reference if any ability modifies this threshold."
    added: 2026-05-15
    revised: ""

  - name: HP_MAX
    status: active
    source: design/gdd/health-damage.md
    referenced_by:
      - design/gdd/health-damage.md
      - design/gdd/reclaimer-combat.md    # Combat uses HP_MAX for TTK calculations
      - design/gdd/knockdown-revival.md   # K&R uses HP_MAX for revival restore fraction
      - design/gdd/reclaimer-hud.md       # HUD displays HP as fraction of HP_MAX
    value: 100.0
    unit: HP
    notes: "Maximum Reclaimer HP. All classes share this value. Safe range 60–150. Changes cascade to COMPROMISED_THRESHOLD and CRITICAL_THRESHOLD calculations."
    added: 2026-05-15
    revised: ""

  - name: COMPROMISED_THRESHOLD
    status: active
    source: design/gdd/health-damage.md
    referenced_by:
      - design/gdd/health-damage.md
      - design/gdd/reclaimer-hud.md       # HUD changes color at this threshold
      - design/gdd/reclaimer-class-abilities.md  # Medic may check armor state for ability conditions
    value: 60.0
    unit: HP
    notes: "HP threshold below which ArmorState = Compromised. Must remain > CRITICAL_THRESHOLD and < HP_MAX. Safe range 40–80."
    added: 2026-05-15
    revised: ""

  - name: CRITICAL_THRESHOLD
    status: active
    source: design/gdd/health-damage.md
    referenced_by:
      - design/gdd/health-damage.md
      - design/gdd/reclaimer-hud.md       # HUD enters critical pulse at this threshold
      - design/gdd/knockdown-revival.md   # K&R may use critical state for triage priority
    value: 30.0
    unit: HP
    notes: "HP threshold below which ArmorState = Critical. Must remain < COMPROMISED_THRESHOLD. Safe range 10–50."
    added: 2026-05-15
    revised: ""

  - name: TEAMMATE_ELIMINATED_WEIGHT
    status: active
    source: design/gdd/corruption-meter.md
    referenced_by:
      - design/gdd/corruption-meter.md
      - design/gdd/health-damage.md       # H&D fires this event on Elimination
    value: 3.0
    unit: "%"
    notes: "Corruption added when a Reclaimer is Eliminated (bleedout timer expires without revival). Safe range 1.0–8.0. Source GDD is corruption-meter.md (defined in event table); registered here when H&D first implemented the firing logic."
    added: 2026-05-15
    revised: ""

  - name: FALL_SAFE_DISTANCE
    status: active
    source: design/gdd/health-damage.md
    referenced_by:
      - design/gdd/health-damage.md
      - design/gdd/level-sector-system.md  # Level design uses this to calibrate vertical traversal
    value: 3.0
    unit: m
    notes: "Minimum fall height (meters) before damage is applied. Falls below this deal no damage. Safe range 1.0–5.0 m."
    added: 2026-05-15
    revised: ""

  - name: FALL_DAMAGE_RATE
    status: active
    source: design/gdd/health-damage.md
    referenced_by:
      - design/gdd/health-damage.md
    value: 10.0
    unit: HP/m
    notes: "HP damage per meter of fall above FALL_SAFE_DISTANCE. Safe range 5–30 HP/m. At default, 5m fall = 20 HP; 13m fall = 100 HP (instant Downed)."
    added: 2026-05-15
    revised: ""

